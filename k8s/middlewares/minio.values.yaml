# =============================================================================
# Alephant — MinIO 部署 (兼容 docker-compose 的 pgsty/minio 镜像)
# =============================================================================
# 用法:
#   kubectl apply -f middlewares/minio-deploy.yaml
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: alephant-minio
  namespace: alephant-prod
  labels:
    app: alephant-minio
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  selector:
    app: alephant-minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alephant-minio
  namespace: alephant-prod
  labels:
    app: alephant-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alephant-minio
  template:
    metadata:
      labels:
        app: alephant-minio
    spec:
      imagePullSecrets:
        - name: alephant-registry-cred
      containers:
        - name: minio
          image: pgsty/minio:latest
          imagePullPolicy: IfNotPresent
          command:
            - server
            - /data
            - --console-address
            - :9001
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: "admin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin123"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: alephant-minio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alephant-minio
  namespace: alephant-prod
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: alicloud-disk-essd
  resources:
    requests:
      storage: 50Gi
