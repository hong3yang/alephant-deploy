user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        font/opentype
        font/truetype
        image/svg+xml;

    # =========================================================================
    # 上游后端服务 (Docker Compose 内部网络)
    # =========================================================================
    upstream saas-app-internal    { server saas-app:80; }
    upstream saas-backend-internal    { server saas-service:8080; }
    upstream ai-gateway-internal  { server ai-gateway:8080; }
    upstream policy-service-internal    { server policy-service:8080; }
    upstream logs-collector-internal { server logs-collector:8585; }

    # =========================================================================
    # Web app (port 80) — 透传到 saas-app 内置 nginx
    # saas-app 的 nginx 由容器动态模板生成，负责 SPA + /api/v1/ 代理
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # 所有请求透传给 saas-app 内置 nginx
        location / {
            proxy_pass http://saas-app-internal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api/v1 {
            proxy_pass http://saas-backend-internal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /v1/policy {
            proxy_pass http://policy-service-internal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # =========================================================================
    # AI Gateway (port 81)
    # =========================================================================
    server {
        listen 81;
        server_name _;

        location /v1/ {
            proxy_pass http://ai-gateway-internal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            return 404;
        }
    }

    # =========================================================================
    # Analytics / Logs Collector (port 82)
    # =========================================================================
    server {
        listen 82;
        server_name _;

        location /analytics/ {
            proxy_pass http://logs-collector-internal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v1/ {
            proxy_pass http://logs-collector-internal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            return 404;
        }
    }
}
