# =============================================================================
# Alephant Production Stack - Docker Compose
# =============================================================================
# 从 Kubernetes (tradly-aliyun.yaml / alephant-prod) 迁移至 Docker Compose
#
# 使用方式:
#   1. 复制 infra.env.example 为 infra.env，填入基础设施密码
#   2. 为每个应用填写对应的 *.env 文件中的 <请替换> 值
#      (可从 K8s Secret 中导出: alephant-*-infisical-secrets)
#   3. docker compose up -d
#
# 环境变量体系:
#   infra.env        → PostgreSQL / ClickHouse / Valkey / Qdrant 凭证
#   saas-service.env → SaaS 后端 (76 vars, 源自 Infisical)
#   policy-service.env → 策略后端 (24 vars)
#   ai-gateway.env    → AI 网关 (27 vars)
#   logs-collector.env → 日志收集 (12 vars)
# =============================================================================

networks:
  alephant-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  clickhouse-data:
    driver: local
  valkey-data:
    driver: local
  qdrant-storage:
    driver: local
  pd-data:
    driver: local
  tikv-data:
    driver: local
  minio-data:
    driver: local

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL (数据库)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: alephant-postgres
    restart: unless-stopped
    networks:
      - alephant-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - infra.env
    environment:
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alephant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # ---------------------------------------------------------------------------
  # ClickHouse (OLAP 数据库)
  # ---------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: alephant-clickhouse
    restart: unless-stopped
    networks:
      - alephant-net
    # ports:
    #   - "127.0.0.1:8123:8123"   # HTTP 接口
    #   - "127.0.0.1:9000:9000"   # 原生 TCP
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./config/clickhouse/config.d:/etc/clickhouse-server/config.d:ro
      # 不挂载 users.d — entrypoint 自动从 CLICKHOUSE_PASSWORD 生成 default-user.xml
    env_file:
      - infra.env
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # ---------------------------------------------------------------------------
  # Valkey / Redis (缓存)
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:9.0.2
    container_name: alephant-valkey
    restart: unless-stopped
    networks:
      - alephant-net
    volumes:
      - valkey-data:/data
    env_file:
      - infra.env
    command: ["valkey-server", "--loglevel", "notice", "--requirepass", "${VALKEY_PASSWORD}"]
    healthcheck:
      test: ["CMD", "sh", "-c", "valkey-cli -a \"${VALKEY_PASSWORD}\" --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Qdrant (向量数据库) - 单节点模式
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: alephant-qdrant
    restart: unless-stopped
    networks:
      - alephant-net
    volumes:
      - qdrant-storage:/qdrant/storage
      - ./config/qdrant/production.yaml:/qdrant/config/production.yaml:ro
    env_file:
      - infra.env
    environment:
            QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 3s
      retries: 6
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
  # ---------------------------------------------------------------------------
  # PD (Placement Driver — TiKV 集群管理)
  # ---------------------------------------------------------------------------
  pd:
    image: pingcap/pd:v7.5.0
    container_name: alephant-pd
    restart: unless-stopped
    networks:
      - alephant-net
    volumes:
      - pd-data:/data/pd
    command:
      - --name=pd
      - --data-dir=/data/pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2379/pd/api/v1/version"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---------------------------------------------------------------------------
  # TiKV (分布式 KV 存储)
  # ---------------------------------------------------------------------------
  tikv:
    image: pingcap/tikv:v7.5.0
    container_name: alephant-tikv
    restart: unless-stopped
    networks:
      - alephant-net
    volumes:
      - tikv-data:/data/tikv
    command:
      - --pd-endpoints=pd:2379
      - --data-dir=/data/tikv
      - --advertise-addr=tikv:20160
    depends_on:
      pd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:20160/status"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # ---------------------------------------------------------------------------
  # MinIO (S3 兼容对象存储)
  # ---------------------------------------------------------------------------
  minio:
    image: pgsty/minio:latest
    container_name: alephant-minio
    restart: unless-stopped
    networks:
      - alephant-net
    volumes:
      - minio-data:/data
    env_file:
      - infra.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  # ---------------------------------------------------------------------------
  # SaaS 前端 + API 反向代理 (Nginx — 使用容器内置动态模板)
  # 不覆盖 nginx.conf，不直接暴露端口，由 gateway 统一代理
  # ---------------------------------------------------------------------------
  saas-app:
    depends_on:
      - saas-service
      - policy-service
      - ai-gateway
      - logs-collector
    image: ${APP_IMAGE:-registry.openmodels.link/alephant/alephant-app:20260712195934}
    container_name: alephant-app
    restart: unless-stopped
    networks:
      - alephant-net
    env_file:
      - app.env


  # ---------------------------------------------------------------------------
  # SaaS 后端
  # ---------------------------------------------------------------------------
  saas-service:
    image: ${SAAS_SERVICE_IMAGE:-registry.openmodels.link/alephant/alephant-saas-service:20260712195945}
    container_name: alephant-saas-service
    restart: unless-stopped
    networks:
      - alephant-net
    env_file:
      - saas-service.env
    volumes:
      - ./license/license.jwt:/etc/alephant/license/license.jwt:ro
    environment:
      ALEPHANT_LICENSE_FILE: /etc/alephant/license/license.jwt
      PRIVATE_WORKSPACE_OWNER_EMAILS: "${PRIVATE_WORKSPACE_OWNER_EMAILS:-}"

  # ---------------------------------------------------------------------------
  # 策略后端
  # ---------------------------------------------------------------------------
  policy-service:
    image: ${POLICY_SERVICE_IMAGE:-registry.openmodels.link/alephant/alephant-policy-service:20260712195949}
    container_name: alephant-policy-service
    restart: unless-stopped
    networks:
      - alephant-net
    env_file:
      - policy-service.env

  # ---------------------------------------------------------------------------
  # AI Gateway
  # ---------------------------------------------------------------------------
  ai-gateway:
    depends_on:
      - pd
      - tikv
      - minio
    image: ${AI_GATEWAY_IMAGE:-registry.openmodels.link/alephant/alephant-ai-gateway:20260712194908}
    container_name: alephant-ai-gateway
    restart: unless-stopped
    networks:
      - alephant-net
    env_file:
      - ai-gateway.env

  # ---------------------------------------------------------------------------
  # Logs Collector
  # ---------------------------------------------------------------------------
  logs-collector:
    image: ${LOGS_COLLECTOR_IMAGE:-registry.openmodels.link/alephant/alephant-logs-collector:20260712195944}
    container_name: alephant-logs-collector
    restart: unless-stopped
    networks:
      - alephant-net
    env_file:
      - logs-collector.env

  # ---------------------------------------------------------------------------
  # Gateway (统一接入网关 — Nginx)
  # 暴露 80/81/82，反向代理到内部各服务
  # ---------------------------------------------------------------------------
  gateway:
    depends_on:
      - saas-app
      - ai-gateway
      - logs-collector
    image: nginx:alpine
    container_name: alephant-gateway
    restart: unless-stopped
    networks:
      - alephant-net
    ports:
      - "80:80"   # Web app (SPA + API) → saas-app
      - "81:81"   # AI Gateway → ai-gateway
      - "82:82"   # Logs Collector → logs-collector
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
