user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        font/opentype
        font/truetype
        image/svg+xml;

    # =========================================================================
    # 上游后端服务 (Docker Compose 网络 — alephant-net)
    # =========================================================================
    upstream saas-service { server saas-service:8080; }
    upstream ai-gateway  { server ai-gateway:8080; }
    upstream logs-collector { server logs-collector:8585; }
    upstream policy-service { server policy-service:8090; }

    # =========================================================================
    # Web app
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # --- SaaS API ---
        location /api/v1/ {
            proxy_pass http://saas-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- SPA 前端 ---
        location / {
            root /app;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 敏感文件屏蔽
        location ~ ^/(\.env|\.git|\.svn|\.htaccess|README.md|LICENSE)$ {
            deny all;
        }
    }

    # =========================================================================
    # AI Gateway
    # =========================================================================
    server {
        listen 81;
        server_name _;

        location /v1/ {
            proxy_pass http://ai-gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            return 404;
        }
    }

    # =========================================================================
    # Analytics / Logs Collector
    # =========================================================================
    server {
        listen 82;
        server_name _;

        location /v1/ {
            proxy_pass http://logs-collector/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location / {
            return 404;
        }
    }
}
